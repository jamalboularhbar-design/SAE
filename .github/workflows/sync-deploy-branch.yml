name: Sync deploy/production branch

on:
  push:
    branches: [main]
    paths:
      - "apps/playbooks/**"
      - "scripts/sync-deploy-branch.sh"
      - ".github/workflows/sync-deploy-branch.yml"
      - ".github/workflows/railway-redeploy.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deploy branch
        run: bash scripts/sync-deploy-branch.sh

      - name: Push deploy/production
        run: git push -f origin deploy/production

  redeploy:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway serviceInstanceDeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          if [[ -z "$RAILWAY_TOKEN" ]]; then
            echo "RAILWAY_TOKEN secret not configured — skipping API redeploy."
            echo "Railway should still deploy from the deploy/production branch push."
            exit 0
          fi
          if [[ -z "$SERVICE_ID" || -z "$ENVIRONMENT_ID" ]]; then
            echo "Set repository variables RAILWAY_SERVICE_ID and RAILWAY_ENVIRONMENT_ID — skipping API redeploy."
            exit 0
          fi
          curl -sf -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation(\$serviceId:String!,\$environmentId:String!){serviceInstanceDeploy(serviceId:\$serviceId,environmentId:\$environmentId)}\",\"variables\":{\"serviceId\":\"${SERVICE_ID}\",\"environmentId\":\"${ENVIRONMENT_ID}\"}}"
