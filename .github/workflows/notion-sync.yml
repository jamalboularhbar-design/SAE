name: Notion Sync — NexusAI PPV Ops Hub

on:
  push:
    branches: [main]
    paths:
      - "apps/playbooks/scripts/notion/**"
      - "apps/playbooks/docs-seed/**"
      - "docs/**"
      - "apps/playbooks/shared/demoWorkspaces.ts"
      - ".github/workflows/notion-sync.yml"
  schedule:
    # Weekly Monday 10:00 UTC
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Refresh full markdown body in Vault pages (slow, ~30+ min)"
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/playbooks
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/playbooks/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore sync manifest from last run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --repo "${{ github.repository }}" --workflow=notion-sync.yml \
            --branch=main --status=success --limit 1 --json databaseId -q '.[0].databaseId')
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            gh run download "$RUN_ID" --repo "${{ github.repository }}" \
              -n notion-sync-manifest -D scripts/notion/
            echo "Restored manifest from run $RUN_ID"
          else
            echo "No prior manifest — using manifest.default.json page cache"
          fi

      - name: Verify NOTION_API_KEY secret
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: |
          if [ -z "$NOTION_API_KEY" ]; then
            echo "::error::NOTION_API_KEY is missing. Add it under Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Notion upsert sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_SYNC_LIGHT: ${{ github.event_name == 'workflow_dispatch' && inputs.full_sync && '0' || '1' }}
        run: node scripts/notion/sync-notion.mjs

      - name: Upload sync manifest
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notion-sync-manifest
          path: apps/playbooks/scripts/notion/.notion-sync-manifest.json
          if-no-files-found: ignore
